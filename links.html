<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahil Corcino - Links</title>

    <meta name="theme-color" content="#0a0a0a">

    <link rel="icon" type="image/png" href="assets/nand.png">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        #links-page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: 'SF MONO', 'Fira Code', monospace;
        }

        .links-card {
            width: 100%;
            max-width: 420px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            position: relative;
        }

        body.light-mode .links-card {
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .links-banner {
            width: 100%;
            aspect-ratio: 32/9;
            position: relative;
            background-color: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            overflow: hidden;
        }

        body.light-mode .links-banner {
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
        }

        .links-pcb {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: background-image 0.5s ease;
        }

        body.dark-mode .links-pcb {
            background-image: url('assets/xray.webp');
        }

        body.light-mode .links-pcb {
            background-image: url('assets/realistic.webp');
        }

        .links-profile-container {
            display: flex;
            justify-content: center;
            margin-top: -50px;
            position: relative;
            z-index: 2;
        }

        .links-profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0a0a0a;
            transition: border-color 0.5s ease;
        }

        body.light-mode .links-profile-pic {
            border: 3px solid #f5f5f5;
        }

        .links-header {
            text-align: center;
            padding: 0.5rem 1.5rem 0;
        }

        .links-name {
            font-size: 1.3rem;
            font-weight: 300;
            margin-bottom: 0.25rem;
            letter-spacing: 0.05em;
        }

        .links-desc {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
            line-height: 1.4;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 0 1.5rem 2rem;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            position: relative;
        }

        body.light-mode .link-item {
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .link-item:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.02);
            transform: translateY(-2px);
        }

        body.light-mode .link-item:hover {
            border-color: rgba(0, 0, 0, 0.5);
            background-color: rgba(0, 0, 0, 0.02);
        }

        .link-title {
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .link-subtext {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.25rem;
            letter-spacing: 0.02em;
        }

        .mode-toggle-links {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .portfolio-link {
            position: relative;
            overflow: hidden;
        }

        #portfolio-button-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .resume-link {
            background-color: #ffffff;
            color: #0a0a0a !important;
            border-color: #ffffff;
            font-weight: 600;
            padding: 1rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .resume-link:hover {
            background-color: #e6e6e6;
            border-color: #e6e6e6;
            transform: translateY(-2px);
        }

        body.light-mode .resume-link {
            background-color: #0a0a0a;
            color: #ffffff !important;
            border-color: #0a0a0a;
        }

        body.light-mode .resume-link:hover {
            background-color: #1a1a1a;
            border-color: #1a1a1a;
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="dark-mode">
    <div id="links-page">
        <div class="links-card">


            <div class="links-banner">
                <div class="links-pcb"></div>
            </div>
            <div class="links-profile-container">
                <img src="assets/profile.jpg" alt="Yahil Corcino Valdez" class="links-profile-pic">
            </div>

            <div class="links-header">
                <h1 class="links-name">Yahil Corcino</h1>
                <p class="links-desc">Computer Engineering & Applied Math @ NJIT</p>
            </div>

            <div class="links-list">
                <a href="mailto:yrc@njit.edu" class="link-item">
                    <span class="link-title">Email</span>
                    <span class="link-subtext">yrc@njit.edu</span>
                </a>
                <a href="https://linkedin.com/in/yahil-corcino" target="_blank" rel="noopener noreferrer"
                    class="link-item">
                    <span class="link-title">LinkedIn</span>
                    <span class="link-subtext">linkedin.com/in/yahil-corcino</span>
                </a>
                <a href="https://github.com/YRCV" target="_blank" rel="noopener noreferrer" class="link-item">
                    <span class="link-title">GitHub</span>
                    <span class="link-subtext">github.com/YRCV</span>
                </a>
                <a href="https://yrcv.github.io" class="link-item portfolio-link">
                    <canvas id="portfolio-button-canvas"></canvas>
                    <span class="link-title">Portfolio</span>
                    <span class="link-subtext">yrcv.org</span>
                </a>
                <a href="assets/YahilCorcinoResume.pdf" target="_blank" class="link-item resume-link">
                    <span class="link-title">Resume</span>
                </a>
            </div>
        </div>

        <div class="mode-toggle mode-toggle-links">
            <button class="mode-button" onclick="toggleLocalMode()">
                <span class="mode-icon dark-icon">◐</span>
                <span class="mode-icon light-icon">◐</span>
            </button>
        </div>
    </div>

    <script>
        function toggleLocalMode() {
            const currentMode = document.body.className.includes('dark') ? 'dark' : 'light';
            const newMode = currentMode === 'dark' ? 'light' : 'dark';
            document.body.className = newMode + '-mode';
            localStorage.setItem('preferredMode', newMode);
        }

        function initLocalMode() {
            const savedMode = localStorage.getItem('preferredMode');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.body.className = (savedMode || (prefersDark ? 'dark' : 'light')) + '-mode';
        }

        document.addEventListener('DOMContentLoaded', initLocalMode);

        (function() {
            const canvas = document.getElementById('portfolio-button-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const button = canvas.closest('.portfolio-link');
            
            let particles = [];
            let frame = 0;

            function resizeCanvas() {
                const rect = button.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
            }

            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const PIXEL = 3;
            const R = 0, G = 255, B = 136; // Cyan/neon green

            function spawnParticle() {
                const W = canvas.width;
                const H = canvas.height;
                const side = (Math.random() * 4) | 0;
                let x, y;

                if (side === 0) { x = Math.random() * W; y = 0; }
                else if (side === 1) { x = W; y = Math.random() * H; }
                else if (side === 2) { x = Math.random() * W; y = H; }
                else { x = 0; y = Math.random() * H; }

                const cx = W / 2, cy = H / 2;
                const dx = cx - x, dy = cy - y;
                const len = Math.sqrt(dx * dx + dy * dy) || 1;
                const speed = 0.5 + Math.random() * 1.2;
                const life = 0.6 + Math.random() * 0.4;

                particles.push({
                    x, y,
                    vx: (dx / len) * speed,
                    vy: (dy / len) * speed,
                    alpha: 1,
                    decay: speed / (len * life),
                    size: Math.random() < 0.25 ? PIXEL * 2 : PIXEL,
                    trail: [],
                });
            }

            function snap(v) {
                return Math.round(v / PIXEL) * PIXEL;
            }

            function tick() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (frame % 3 === 0) {
                    for (let i = 0; i < 2; i++) spawnParticle();
                }

                particles = particles.filter(p => p.alpha > 0.01);

                for (const p of particles) {
                    p.trail.push({ x: snap(p.x), y: snap(p.y) });
                    if (p.trail.length > 5) p.trail.shift();

                    for (let t = 0; t < p.trail.length; t++) {
                        const a = p.alpha * (t / p.trail.length) * 0.35;
                        ctx.fillStyle = `rgba(${R},${G},${B},${a})`;
                        ctx.fillRect(p.trail[t].x, p.trail[t].y, p.size, p.size);
                    }

                    ctx.fillStyle = `rgba(${R},${G},${B},${p.alpha})`;
                    ctx.fillRect(snap(p.x), snap(p.y), p.size, p.size);

                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= p.decay;
                }

                frame++;
                requestAnimationFrame(tick);
            }

            tick();
        })();
    </script>
</body>

</html>
